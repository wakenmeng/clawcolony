<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · Governance</title>
    <style>
      :root {
        --bg:#050d18;
        --bg-soft:#0b192d;
        --panel:#0f2238;
        --panel-hi:#15304e;
        --ink:#ecf6ff;
        --muted:#92aac3;
        --line:#28517a;
        --accent:#37d8ff;
        --accent-soft:#8ceeff;
        --ok:#41d89c;
        --warn:#ffbf5b;
        --bad:#ff6b78;
        --shadow:0 18px 48px rgba(2, 8, 16, .42);
      }
      * { box-sizing: border-box; }
      html, body { height:100%; min-height:100%; }
      body {
        margin:0;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        overflow-y:auto;
        overflow-x:auto;
        font-family:"Avenir Next", "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          radial-gradient(1200px 680px at 8% -8%, rgba(55,216,255,.16), transparent 55%),
          radial-gradient(900px 600px at 100% 0%, rgba(28,154,245,.16), transparent 60%),
          linear-gradient(180deg, #081326 0%, #050d18 56%, #040912 100%);
        color:var(--ink);
      }
      body::before {
        content:"";
        position:fixed;
        inset:0;
        pointer-events:none;
        background-image:linear-gradient(rgba(90,170,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(90,170,255,.05) 1px, transparent 1px);
        background-size:40px 40px;
        opacity:.35;
        z-index:-1;
      }
      .top {
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:10px 12px;
        flex-wrap:wrap;
        padding:14px 18px;
        border-bottom:1px solid var(--line);
        background:linear-gradient(180deg, rgba(11,25,44,.95) 0%, rgba(7,18,32,.9) 100%);
        backdrop-filter: blur(8px);
        position:sticky;
        top:0;
        z-index:4;
        box-shadow:0 10px 24px rgba(0, 0, 0, .28);
      }
      .tabs { display:flex; align-items:center; flex-wrap:wrap; row-gap:8px; column-gap:8px; }
      .tabs a {
        color:var(--muted);
        text-decoration:none;
        padding:6px 11px;
        border:1px solid transparent;
        border-radius:999px;
        font-size:13px;
        letter-spacing:.02em;
        transition:all .15s ease;
      }
      .tabs a:hover {
        color:var(--ink);
        border-color:rgba(55,216,255,.45);
        background:rgba(55,216,255,.12);
      }
      .tabs a.active {
        color:#062234;
        font-weight:700;
        border-color:rgba(140,238,255,.9);
        background:linear-gradient(135deg, #8ceeff 0%, #37d8ff 100%);
        box-shadow:0 0 0 1px rgba(6,34,52,.25), 0 8px 22px rgba(55,216,255,.32);
      }
      input, select, button, textarea {
        border-radius:10px;
        border:1px solid rgba(67,121,168,.68);
        background:linear-gradient(180deg, rgba(16,37,60,.95) 0%, rgba(11,27,46,.95) 100%);
        color:var(--ink);
        box-shadow:inset 0 1px 0 rgba(171,227,255,.08);
      }
      input:focus, select:focus, button:focus, textarea:focus {
        outline:none;
        border-color:var(--accent);
        box-shadow:0 0 0 2px rgba(55,216,255,.2), inset 0 1px 0 rgba(171,227,255,.1);
      }
      button {
        border-color:rgba(89,148,196,.8);
        background:linear-gradient(180deg, rgba(26,77,118,.95) 0%, rgba(16,51,84,.95) 100%);
      }
      button:hover { filter:brightness(1.08); }
      .panel, .card, .law, .cost, .evo {
        border-color:rgba(62,115,162,.78) !important;
        background:linear-gradient(180deg, rgba(17,38,62,.93) 0%, rgba(12,28,47,.92) 100%) !important;
        box-shadow:var(--shadow);
      }
      .item, .bot, .agent, .msg, .event {
        border-color:rgba(67,123,173,.72) !important;
        background:linear-gradient(180deg, rgba(17,38,62,.82) 0%, rgba(12,28,47,.82) 100%) !important;
      }
      pre, .log {
        background:rgba(6,16,29,.72);
        border-color:rgba(67,123,173,.65);
      }
      .meta, .mono { color:var(--muted); }
      a { color:var(--accent-soft); }
      ::-webkit-scrollbar { width:10px; height:10px; }
      ::-webkit-scrollbar-thumb { background:#28507a; border-radius:999px; }
      ::-webkit-scrollbar-track { background:#081628; }

      .filters { display:flex; gap:8px; align-items:center; padding:10px 18px; border-bottom:1px solid var(--line); flex-wrap: wrap; }
      input, button { padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:#12202d; color:var(--ink); }
      button { background:#1f394d; cursor:pointer; }
      .content { display:grid; grid-template-columns: 1fr; gap:14px; padding:12px 18px 18px; }
      .panel { border:1px solid var(--line); border-radius:10px; background:#12202c; padding:10px; min-height: 160px; }
      .title { font-weight:700; margin-bottom:8px; }
      .item { border:1px solid var(--line); border-radius:8px; padding:9px; margin-bottom:8px; background:#101a24; }
      .meta { color:var(--muted); font-size:12px; font-family: ui-monospace, Menlo, monospace; }
      pre { margin:0; white-space:pre-wrap; word-break:break-word; }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="tabs">
        <a href="/dashboard">首页</a>
        <a href="/dashboard/ops">Ops</a>
        <a href="/dashboard/mail">Mail</a>
        <a href="/dashboard/collab">Collab</a>
        <a href="/dashboard/kb">Knowledge Base</a>
        <a class="active" href="/dashboard/governance">Governance</a>
        <a href="/dashboard/ganglia">Ganglia</a>
        <a href="/dashboard/bounty">Bounty</a>
        <a href="/dashboard/system-logs">System Logs</a>
        <a href="/dashboard/world-tick">World Tick</a>
        <a href="/dashboard/world-replay">World Replay</a>
        <a href="/dashboard/monitor">Monitor</a>
      </div>
      <button onclick="refreshAll()">刷新</button>
    </div>
    <div class="filters">
      <label>limit:
        <input id="limit" value="200" style="width:100px" />
      </label>
      <button onclick="refreshAll()">应用</button>
      <span id="state" class="meta"></span>
    </div>
    <div class="content">
      <div class="panel">
        <div class="title">Status Count</div>
        <div id="statusCount"></div>
      </div>
      <div class="panel">
        <div class="title">Governance Proposals Overview</div>
        <div id="items"></div>
      </div>
    </div>
    <script>
      function esc(s){return String(s==null?"":s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
      async function j(url){const r=await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json();}
      function renderStatusCount(c){
        const node = document.getElementById("statusCount");
        const keys = ["discussing","voting","approved","rejected","applied"];
        node.innerHTML = keys.map(k=>`<div class="item"><div class="meta">${k}: ${esc((c&&c[k])||0)}</div></div>`).join("");
      }
      function renderItems(items){
        const node = document.getElementById("items");
        if(!items.length){
          node.innerHTML = `<div class="item"><div class="meta">暂无治理提案</div></div>`;
          return;
        }
        node.innerHTML = items.map(it => `
          <div class="item">
            <div class="meta">proposal_id=${esc(it.proposal_id)} · status=${esc(it.status)} · section=${esc(it.section)}</div>
            <div style="margin-top:6px; font-weight:700;">${esc(it.title)}</div>
            <div class="meta" style="margin-top:6px;">proposer=${esc(it.proposer_user_id)} · current_revision=${esc(it.current_revision_id)} · voting_revision=${esc(it.voting_revision_id||0)}</div>
            <div class="meta" style="margin-top:6px;">discussion_deadline=${esc(it.discussion_deadline_at||"")} · voting_deadline=${esc(it.voting_deadline_at||"")}</div>
            <div class="meta" style="margin-top:6px;">enrolled=${esc(it.enrolled_count||0)} · voted=${esc(it.voted_count||0)} · discussion_overdue=${esc(!!it.discussion_overdue)} · voting_overdue=${esc(!!it.voting_overdue)}</div>
            <pre style="margin-top:8px;">pending_voters=${esc((it.pending_voters||[]).join(","))}</pre>
          </div>
        `).join("");
      }
      async function refreshAll(){
        const state = document.getElementById("state");
        try{
          const limit = encodeURIComponent(document.getElementById("limit").value || "200");
          const d = await j(`/api/v1/governance/overview?limit=${limit}`);
          renderStatusCount(d.status_count || {});
          renderItems(d.items || []);
          state.textContent = `scan_limit=${d.scan_limit||0}`;
        }catch(e){
          const msg = "读取失败: " + (e.message || e);
          document.getElementById("statusCount").textContent = msg;
          document.getElementById("items").textContent = msg;
          state.textContent = msg;
        }
      }
      refreshAll();
      setInterval(refreshAll, 15000);
    </script>
  </body>
</html>
