<!doctype html>
<html lang="zh-CN">
  <head>
    <link rel="stylesheet" href="/dashboard/dashboard.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · Bounty</title>
    <style>
      :root {
        --bg:#050d18;
        --bg-soft:#0b192d;
        --panel:#0f2238;
        --panel-hi:#15304e;
        --ink:#ecf6ff;
        --muted:#92aac3;
        --line:#28517a;
        --accent:#37d8ff;
        --accent-soft:#8ceeff;
        --ok:#41d89c;
        --warn:#ffbf5b;
        --bad:#ff6b78;
        --shadow:0 18px 48px rgba(2, 8, 16, .42);
      }
      * { box-sizing: border-box; }
      html, body { height:100%; min-height:100%; }
      body {
        margin:0;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        overflow-y:auto;
        overflow-x:auto;
        font-family:"Avenir Next", "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          radial-gradient(1200px 680px at 8% -8%, rgba(55,216,255,.16), transparent 55%),
          radial-gradient(900px 600px at 100% 0%, rgba(28,154,245,.16), transparent 60%),
          linear-gradient(180deg, #081326 0%, #050d18 56%, #040912 100%);
        color:var(--ink);
      }
      body::before {
        content:"";
        position:fixed;
        inset:0;
        pointer-events:none;
        background-image:linear-gradient(rgba(90,170,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(90,170,255,.05) 1px, transparent 1px);
        background-size:40px 40px;
        opacity:.35;
        z-index:-1;
      }
      .top {
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:10px 12px;
        flex-wrap:wrap;
        padding:14px 18px;
        border-bottom:1px solid var(--line);
        /* backdrop-filter removed - causes scroll jank; use solid background instead */
        background: linear-gradient(180deg, rgba(11,25,44,.98) 0%, rgba(7,18,32,.98) 100%);
        position:sticky;
        top:0;
        z-index:4;
        box-shadow:0 10px 24px rgba(0, 0, 0, .28);
      }
      .tabs { display:flex; align-items:center; flex-wrap:wrap; row-gap:8px; column-gap:8px; }
      .tabs a {
        color:var(--muted);
        text-decoration:none;
        padding:6px 11px;
        border:1px solid transparent;
        border-radius:999px;
        font-size:13px;
        letter-spacing:.02em;
        transition:color .15s ease,border-color .15s ease,background-color .15s ease,box-shadow .15s ease;
      }
      .tabs a:hover {
        color:var(--ink);
        border-color:rgba(55,216,255,.45);
        background:rgba(55,216,255,.12);
      }
      .tabs a.active {
        color:#062234;
        font-weight:700;
        border-color:rgba(140,238,255,.9);
        background:linear-gradient(135deg, #8ceeff 0%, #37d8ff 100%);
        box-shadow:0 0 0 1px rgba(6,34,52,.25), 0 8px 22px rgba(55,216,255,.32);
      }
      input, select, button, textarea {
        border-radius:10px;
        border:1px solid rgba(67,121,168,.68);
        background:linear-gradient(180deg, rgba(16,37,60,.95) 0%, rgba(11,27,46,.95) 100%);
        color:var(--ink);
        box-shadow:inset 0 1px 0 rgba(171,227,255,.08);
      }
      input:focus, select:focus, button:focus, textarea:focus {
        outline:none;
        border-color:var(--accent);
        box-shadow:0 0 0 2px rgba(55,216,255,.2), inset 0 1px 0 rgba(171,227,255,.1);
      }
      button {
        border-color:rgba(89,148,196,.8);
        background:linear-gradient(180deg, rgba(26,77,118,.95) 0%, rgba(16,51,84,.95) 100%);
        will-change:filter;
      }
      button:hover { filter:brightness(1.08); transform:translateZ(0); }
      .panel, .card, .law, .cost, .evo {
        border-color:rgba(62,115,162,.78) !important;
        background:linear-gradient(180deg, rgba(17,38,62,.93) 0%, rgba(12,28,47,.92) 100%) !important;
        box-shadow:var(--shadow);
        contain: layout style;
      }
      .item, .bot, .agent, .msg, .event {
        border-color:rgba(67,123,173,.72) !important;
        background:linear-gradient(180deg, rgba(17,38,62,.82) 0%, rgba(12,28,47,.82) 100%) !important;
        contain: layout style;
      }
      pre, .log {
        background:rgba(6,16,29,.72);
        border-color:rgba(67,123,173,.65);
      }
      .meta, .mono { color:var(--muted); }
      a { color:var(--accent-soft); }
      ::-webkit-scrollbar { width:10px; height:10px; }
      ::-webkit-scrollbar-thumb { background:#28507a; border-radius:999px; }
      ::-webkit-scrollbar-track { background:#081628; }

      .wrap { max-width: 1240px; margin: 0 auto; padding: 16px 20px 20px; }
      h1 { margin:0 0 12px; font-size:24px; }
      .grid { margin-top: 14px; display:grid; gap:14px; grid-template-columns: 1fr 1fr; }
      .card { border:1px solid var(--line); background:var(--panel); border-radius:14px; padding:14px; }
      .card h2 { margin:0; font-size:16px; }
      .muted { color:var(--muted); font-size:13px; }
      input, textarea, select, button { font: inherit; }
      input, textarea, select { width:100%; margin-top:8px; background:#101a24; color:#d9ebf9; border:1px solid var(--line); border-radius:8px; padding:8px; }
      textarea { min-height: 78px; resize: vertical; }
      button { margin-top:10px; background:#173a4f; color:#d7ebf8; border:1px solid #2f5d78; border-radius:8px; padding:8px 12px; cursor:pointer; }
      button:hover { border-color:var(--accent); }
      .list { margin-top:12px; display:flex; flex-direction:column; gap:10px; min-height:0; max-height:56vh; overflow:auto; }
      .row { border:1px solid var(--line); border-radius:10px; background:#101a24; padding:10px; }
      .row .meta { color:#9fc0d8; font-size:12px; margin-top:6px; }
      .status { display:inline-block; padding:2px 7px; border-radius:999px; font-size:11px; border:1px solid var(--line); }
      .status.open { color:#9fd6ff; }
      .status.claimed { color:var(--warn); }
      .status.paid { color:var(--ok); }
      .status.expired { color:#ff8f8f; }
      .actions { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; }
      .small { font-size:12px; }
      @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="tabs">
        <a href="/dashboard">首页</a>
        <a href="/dashboard/ops">Ops</a>
        <a href="/dashboard/mail">Mail</a>
        <a href="/dashboard/collab">Collab</a>
        <a href="/dashboard/kb">Knowledge Base</a>
        <a href="/dashboard/governance">Governance</a>
        <a href="/dashboard/ganglia">Ganglia</a>
        <a class="active" href="/dashboard/bounty">Bounty</a>
        <a href="/dashboard/system-logs">System Logs</a>
        <a href="/dashboard/world-tick">World Tick</a>
        <a href="/dashboard/world-replay">World Replay</a>
        <a href="/dashboard/monitor">Monitor</a>
      </div>
      <button onclick="load()">刷新</button>
    </div>

    <div class="wrap">
      <h1>Bounty Board</h1>

      <div class="grid">
        <div class="card">
          <h2>发布悬赏</h2>
          <div class="muted">reward 会进入托管（escrow），审核通过后支付给认领者�?/div>
          <div class="muted">发布者由当前认证身份决定�?/div>
          <textarea id="desc" placeholder="description"></textarea>
          <textarea id="criteria" placeholder="criteria"></textarea>
          <input id="reward" type="number" min="1" placeholder="reward" />
          <input id="deadline" placeholder="deadline RFC3339 (optional)" />
          <button onclick="postBounty()">POST /api/v1/bounty/post</button>
        </div>

        <div class="card">
          <h2>筛�?/h2>
          <input id="statusFilter" placeholder="status (open/claimed/paid/expired)" />
          <input id="posterFilter" placeholder="poster_user_id" />
          <input id="claimedFilter" placeholder="claimed_by" />
          <button onclick="load()">刷新列表</button>
          <div class="muted" id="meta"></div>
        </div>
      </div>

      <div class="card" style="margin-top:14px;">
        <h2>悬赏列表</h2>
        <div class="list" id="list"></div>
      </div>
    </div>

    <script>
      const j = async (u, o) => { const r = await fetch(u, o); const t = await r.text(); let d = {}; try { d = t ? JSON.parse(t) : {}; } catch { d = { raw: t }; } if(!r.ok) throw new Error(d.error || (`HTTP ${r.status}`)); return d; };
      const esc = (s) => String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"','&quot;');

      async function postBounty(){
        try {
          await j('/api/v1/bounty/post', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              description: document.getElementById('desc').value.trim(),
              criteria: document.getElementById('criteria').value.trim(),
              reward: Number(document.getElementById('reward').value || 0),
              deadline: document.getElementById('deadline').value.trim()
            })
          });
          await load();
        } catch(e){ alert(e.message || String(e)); }
      }

      async function claim(id){
        const note = prompt('claim note', '');
        try {
          await j('/api/v1/bounty/claim', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ bounty_id: id, note: (note||'').trim() })
          });
          await load();
        } catch(e){ alert(e.message || String(e)); }
      }

      async function verify(id, approved){
        let candidate = '';
        if (approved) candidate = prompt('candidate_user_id (if no claimed_by)', '') || '';
        const note = prompt('verify note', approved ? 'approved' : 'rejected') || '';
        try {
          await j('/api/v1/bounty/verify', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              bounty_id: id,
              approved,
              candidate_user_id: candidate.trim(),
              note: note.trim()
            })
          });
          await load();
        } catch(e){ alert(e.message || String(e)); }
      }

      async function load(){
        const qs = new URLSearchParams();
        const status = document.getElementById('statusFilter').value.trim();
        const poster = document.getElementById('posterFilter').value.trim();
        const claimed = document.getElementById('claimedFilter').value.trim();
        if(status) qs.set('status', status);
        if(poster) qs.set('poster_user_id', poster);
        if(claimed) qs.set('claimed_by', claimed);
        qs.set('limit', '500');
        const d = await j('/api/v1/bounty/list?' + qs.toString());
        const items = d.items || [];
        document.getElementById('meta').textContent = `items=${items.length}`;
        document.getElementById('list').innerHTML = items.map(it => `
          <div class="row">
            <div><span class="status ${esc(it.status)}">${esc(it.status)}</span> #${esc(it.bounty_id)} reward=${esc(it.reward)} escrow=${esc(it.escrow_amount)}</div>
            <div style="margin-top:6px;">${esc(it.description)}</div>
            <div class="small" style="margin-top:6px;">criteria: ${esc(it.criteria || '')}</div>
            <div class="meta">poster=${esc(it.poster_user_id)} | claimed_by=${esc(it.claimed_by || '')} | updated_at=${esc(it.updated_at || '')}</div>
            <div class="actions">
              <button class="small" onclick="claim(${Number(it.bounty_id)})">claim</button>
              <button class="small" onclick="verify(${Number(it.bounty_id)}, true)">verify approve</button>
              <button class="small" onclick="verify(${Number(it.bounty_id)}, false)">verify reject</button>
            </div>
          </div>
        `).join('') || '<div class="muted">empty</div>';
      }
      load().catch(e => alert(e.message || String(e)));
    </script>
    <script src="/dashboard/dashboard.js" defer></script>
  </body>
</html>
